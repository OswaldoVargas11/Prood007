name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: legalflow
          POSTGRES_PASSWORD: legalflow
          POSTGRES_DB: legalflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U legalflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://legalflow:legalflow@localhost:5432/legalflow?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      STORAGE_DRIVER: local
      STORAGE_LOCAL_PATH: ./storage

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (packages + apps)
        run: pnpm -r build

      - name: Lint
        run: pnpm -r lint

      - name: Unit tests (compliance)
        run: pnpm --filter @legalflow/compliance test

      - name: Apply migrations
        run: pnpm --filter @legalflow/api exec prisma migrate deploy

      - name: E2E tests (api)
        run: pnpm --filter @legalflow/api test:e2e
