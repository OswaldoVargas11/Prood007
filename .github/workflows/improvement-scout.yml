name: Improvement Scout (Claude)

# La versión SEGURA de "IA que identifica nuevas funcionalidades": propone
# candidatos de mejora (UX + backend) en UN issue priorizado. PROPONE, no
# implementa: no abre PRs ni edita código. Tú decides qué entra al backlog. Esto
# evita el anti-patrón de un agente que cambia defaults fiscales o mete features
# sin probar.

on:
  schedule:
    - cron: '0 6 * * 1' # lunes 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: improvement-scout
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # GH_TOKEN para que `gh issue create` autentique en el Bash del agente.
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 50

      - uses: anthropics/claude-code-action@6c0083bb7289c31716797a039b6367b3079cc46e # v1
        with:
          # Auth por SUSCRIPCIÓN (Pro/Max), no por API key de pago. Genera el token
          # con `claude setup-token` y guárdalo como secret CLAUDE_CODE_OAUTH_TOKEN.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Actúa como revisor de producto y de backend de LegalFlow/Lawzora
            (SaaS legal multi-tenant, multi-jurisdicción ES/RD; monorepo pnpm con
            apps/api en NestJS + Prisma, apps/web en Next.js, paquetes compartidos
            packages/domain y packages/compliance). Revisa el código reciente, los
            TODO/FIXME, DECISIONS.md, docs/PROJECT-STATUS.md y los issues abiertos. Identifica
            candidatos de mejora de UX y de backend.

            TU ENTREGABLE ES CREAR UN ISSUE en GitHub (no describirlo en tu
            respuesta). Crea UN ÚNICO issue ejecutando el comando:
              gh issue create --label scout --title "<título>" --body "<cuerpo>"
            El token con permiso de issues ya está disponible en el entorno como
            GH_TOKEN. Si la etiqueta `scout` no existiese, créala con
            `gh label create scout --color 0E8A16 -f` antes. NO termines sin haber
            creado el issue; al final imprime su URL.

            El cuerpo lleva una lista PRIORIZADA (máx. 8). Para cada candidato:
              - Problema que resuelve y a quién afecta
                (despacho / letrado / cliente del portal).
              - Esfuerzo aproximado: S / M / L.
              - Riesgo fiscal o de cumplimiento: sí/no + por qué.
              - Si toca lógica fiscal, RLS, migraciones, numeración o cifrado:
                márcalo como "requiere ADR / aprobación humana".
            Ordena por (valor / esfuerzo).

            REGLAS ESTRICTAS:
              - PROPÓN, no implementes: NO edites código ni abras PRs. (Crear el
                issue de propuestas SÍ es tu trabajo y es lo único que debes crear.)
              - No propongas nada que cambie defaults fiscales por defecto.
              - No inventes obligaciones regulatorias: si no estás seguro de una
                norma (AEAT/Verifactu, DGII/e-CF…), márcalo como "verificar con
                asesor fiscal".
          claude_args: |
            --allowedTools "Bash(gh issue create:*),Bash(gh label create:*),Bash(gh label list:*),Bash(gh issue list:*)"
            --max-turns 30
            --model claude-sonnet-4-6
