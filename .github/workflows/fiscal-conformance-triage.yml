name: Fiscal Conformance Triage (Claude)

# Se dispara SOLO cuando el gatekeeper determinista falla. El LLM nunca decide
# si algo es conforme: solo explica QUÉ campo fiscal derivó y, si es una
# regresión mecánica y fuera de paths prohibidos, PROPONE un fix en un PR que tú
# debes aprobar. Nunca mergea. Nunca actualiza un golden por su cuenta.

on:
  workflow_run:
    workflows: ['Fiscal Conformance (golden-file)']
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: fiscal-conformance-triage-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  triage:
    # Endurecimiento para repo PÚBLICO: además de exigir que la conformidad haya fallado, solo se
    # dispara para PRs del PROPIO repo (no de forks). Así un PR de un fork que falle a propósito no
    # puede invocar el triaje —que usa tu token de suscripción + permisos de escritura— evitando
    # drenaje de créditos e inyección de prompt desde contenido controlado por terceros.
    if: >-
      ${{ github.event.workflow_run.conclusion == 'failure' &&
          github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # GH_TOKEN para que `gh pr create` / `gh issue create` autentiquen en el Bash del agente.
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Download conformance diff
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: fiscal-conformance-diff
          path: packages/compliance/test/fiscal-conformance/.diff
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - uses: anthropics/claude-code-action@30544b674398ee15c84819bd87caf8a87e8c7b55 # v1
        with:
          # Auth por SUSCRIPCIÓN (Pro/Max), no por API key de pago. Genera el token
          # con `claude setup-token` y guárdalo como secret CLAUDE_CODE_OAUTH_TOKEN.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            El harness de conformidad fiscal (golden-file) de LegalFlow/Lawzora ha
            fallado. En packages/compliance/test/fiscal-conformance/.diff/ tienes
            pares *.golden.json (esperado) y *.actual.json (generado por el código
            actual). Los builders son los providers de @legalflow/compliance
            (SpainComplianceProvider / DominicanComplianceProvider), funciones
            puras: misma entrada ⇒ misma huella.

            Tu tarea:
            1) Identifica con precisión QUÉ campo fiscal cambió: base imponible,
               cuota (IVA/ITBIS), retención (IRPF), numeración, huella SHA-256,
               encadenamiento (huellaAnterior), QR de la AEAT o el XML e-CF.
               Cita el caso afectado (es-factura-simple, rd-ecf-credito-fiscal, …).
            2) Clasifica la deriva:
               (A) regresión accidental, o
               (B) cambio fiscal INTENCIONADO que requiere actualizar el golden
                   + ratificación por ADR (ver DECISIONS.md, p. ej. D-026/D-027).
            3) Si y SOLO si es (A), el fix es mecánico, y NO toca ningún path
               prohibido: crea una rama, commitea la corrección y ABRE UN PR DE
               VERDAD con `gh pr create --label fiscal-triage --title ... --body ...`
               explicando el cambio. En cualquier otro caso CREA un issue con
               `gh issue create --label fiscal-triage --title ... --body ...` y NO
               modifiques código. El token está en el entorno como GH_TOKEN; si la
               etiqueta no existe, créala con `gh label create fiscal-triage -f`.
               Tu entregable es un PR o un issue creado (no solo describirlo); al
               final imprime su URL.

            PROHIBIDO modificar bajo cualquier circunstancia:
              - apps/api/prisma/migrations/** ni apps/api/prisma/schema.prisma
              - cualquier policy/lógica RLS (apps/api/src/prisma/, *.policy.sql)
              - los defaults fiscales de los ComplianceProvider
                (packages/compliance/src/providers/**, tax-math.ts)
              - los golden files (packages/compliance/test/fiscal-conformance/golden/**)
              - secretos o credenciales
            Si la causa raíz vive ahí, descríbela y escala con un issue. No
            mergees nada. No actualices ningún golden por tu cuenta.
          claude_args: |
            --allowedTools "Bash(gh pr create:*),Bash(gh issue create:*),Bash(gh label create:*),Bash(git checkout:*),Bash(git switch:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*)"
            --max-turns 25
            --model claude-sonnet-4-6

      # Enforcement MECÁNICO de la frontera de rutas prohibidas (no solo por prompt): si algún PR del
      # triaje toca migraciones/schema, RLS, los providers fiscales o los golden, se cierra y el job falla.
      # Defensa frente a inyección de prompt desde el contenido del diff (.actual.json no es de fiar).
      - name: Enforce prohibited-path frontier
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PROTECTED='^(apps/api/prisma/migrations/|apps/api/prisma/schema\.prisma|apps/api/src/prisma/|packages/compliance/src/|packages/compliance/test/fiscal-conformance/golden/)|\.policy\.sql$'
          violation=0
          for num in $(gh pr list --label fiscal-triage --state open --json number --jq '.[].number'); do
            files=$(gh pr diff "$num" --name-only 2>/dev/null || true)
            bad=$(printf '%s\n' "$files" | grep -E "$PROTECTED" || true)
            if [ -n "$bad" ]; then
              echo "::error::El PR #$num del triaje toca rutas prohibidas:"; printf '%s\n' "$bad"
              gh pr close "$num" --comment "Cerrado automáticamente: el triaje modificó rutas fiscales/RLS/migraciones prohibidas (enforcement mecánico). Escalar como issue para revisión humana." || true
              violation=1
            fi
          done
          if [ "$violation" = "1" ]; then
            echo "Triaje violó la frontera de rutas prohibidas."; exit 1
          fi
