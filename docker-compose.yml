# Infraestructura local de LegalFlow: Postgres + MinIO (S3) + Redis.
# Las apps (api/web) se ejecutan con pnpm en local; sus Dockerfiles existen para despliegue.
services:
  postgres:
    image: postgres:16-alpine
    container_name: legalflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: legalflow
      POSTGRES_PASSWORD: legalflow
      POSTGRES_DB: legalflow
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U legalflow']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: legalflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # API S3
      - '9001:9001' # Consola web
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # Crea el bucket por defecto al arrancar.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'esperando a MinIO...' && sleep 2; done;
      mc mb --ignore-existing local/legalflow;
      exit 0;
      "

  redis:
    image: redis:7-alpine
    container_name: legalflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  miniodata:
  redisdata:
