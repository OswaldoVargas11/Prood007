# Fly.io — Web Next.js (Lawzora). Build desde la raíz del monorepo con apps/web/Dockerfile.
# Deploy:  flyctl deploy --config fly.web.toml --remote-only
app = "lawzora-web"
primary_region = "fra"

[build]
  dockerfile = "apps/web/Dockerfile"
  [build.args]
    # URL pública de la API (se hornea en el bundle de Next).
    NEXT_PUBLIC_API_URL = "https://api.lawzora.com"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOSTNAME = "0.0.0.0"
  # El BFF (server-side) cae a esta si no hay API_URL.
  NEXT_PUBLIC_API_URL = "https://api.lawzora.com"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
