# Fly.io — API NestJS (Lawzora). Build desde la raíz del monorepo con apps/api/Dockerfile.
# Deploy:  flyctl deploy --config fly.api.toml --remote-only
app = "lawzora-api"
primary_region = "fra"

[build]
  dockerfile = "apps/api/Dockerfile"

[deploy]
  # Aplica las migraciones pendientes con el rol PROPIETARIO (DIRECT_DATABASE_URL, ver RUNBOOK) ANTES de
  # publicar la nueva versión. Evita el desfase código↔esquema: si el código espera una columna nueva, la
  # migración ya está aplicada cuando empieza a servir tráfico. Si la migración falla, el deploy se aborta.
  release_command = "npx prisma migrate deploy"

[http_service]
  internal_port = 4000
  force_https = true
  # El cron (dunning/plazos) vive en la API → SIEMPRE encendida y 1 sola instancia
  # (varias réplicas duplicarían los avisos).
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
